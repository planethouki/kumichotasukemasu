name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create .env file
        shell: bash
        run: |
          cat << 'EOF' > .env
          ${{ secrets.ENV }}
          EOF
      - name: Verify .env exists
        run: |
          if [ -s .env ]; then
            echo ".env created successfully"
            wc -l -c .env
          else
            echo ".env is empty or not created"
            exit 1
          fi
      - run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KUMICHOTASUKEMASU }}
          channelId: live
          projectId: kumichotasukemasu
